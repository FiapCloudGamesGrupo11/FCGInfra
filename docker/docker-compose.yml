services:
  db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: sqlserver
    environment:
      SA_PASSWORD: "Your_strong!Passw0rd"
      ACCEPT_EULA: "Y"
    ports:
      - "1433:1433"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P $$SA_PASSWORD -C -Q 'SELECT 1'"
        ]
      interval: 10s
      timeout: 5s
      retries: 10

  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_running"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  catalogapi:
    build:
      context: ./FCGCatalog
      dockerfile: Dockerfile
    image: fcgcatalogapi:latest
    container_name: catalogapi
    depends_on:
      db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    ports:
      - "8080:80"
    environment:
      ConnectionStrings__ConnectionString: "Server=db,1433;Initial Catalog=FiapCloudGames;User Id=sa;Password=Your_strong!Passw0rd;TrustServerCertificate=True;"
      RabbitMq__Host: rabbitmq
      RabbitMq__User: guest
      RabbitMq__Password: guest
      RabbitMq__OrderQueueName: order-placed
      RabbitMq__PaymentProcessQueueName: payment-processed

  userapi:
    build:
      context: ./FCGUser
      dockerfile: Dockerfile
    image: fcguserapi:latest
    container_name: fcg-userapi
    depends_on:
      db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    ports:
      - "8070:8070"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8070
      ConnectionStrings__ConnectionString: "Server=db,1433;Initial Catalog=FiapCloudGames;User Id=sa;Password=Your_strong!Passw0rd;TrustServerCertificate=True;"
      RabbitMQ__Host: rabbitmq
      RabbitMQ__Port: "5672"
      RabbitMQ__Username: guest
      RabbitMQ__Password: guest
      RabbitMQ__QueueName: user-created
      CatalogApi__BaseUrl: http://catalogapi

  paymentsapi:
    build:
      context: ./FCGPayment
      dockerfile: Dockerfile
    image: fcgpaymentsapi:latest
    container_name: apipayments
    depends_on:
      rabbitmq:
        condition: service_healthy
    ports:
      - "8090:8090"
      - "8091:8091"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      RabbitMQ__Url: rabbitmq
      RabbitMQ__User: guest
      RabbitMQ__Password: guest

  notifications-api:
    build:
      context: ./FCGNotification
      dockerfile: Dockerfile
    image: fcgnotificationapi:latest
    container_name: notifications-api
    depends_on:
      rabbitmq:
        condition: service_healthy
    ports:
      - "5001:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      RabbitMQ__Host: rabbitmq
      RabbitMQ__Port: "5672"
      RabbitMQ__Username: guest
      RabbitMQ__Password: guest
      RabbitMQ__UserCreatedQueueName: user-created
      RabbitMQ__PaymentProcessedQueueName: notification-payment-processed
