apiVersion: apps/v1
kind: Deployment
metadata:
  name: notification-api

spec:
  replicas: 1

  selector:
    matchLabels:
      app: notification-api
  
  template:
    metadata:
      labels:
        app: notification-api
  
    spec:
      containers:
      - name: notification-api
        image: fcgnotificationapi:latest
        imagePullPolicy: IfNotPresent

        ports:
        - containerPort: 5001

        resources:
          requests:
            cpu: "50m"
            memory: "64Mi"
          limits:
            cpu: "250m"
            memory: "256Mi"
            
        envFrom:
        - configMapRef:
            name: configmapcommon
        - secretRef:
              name: secretfcg
