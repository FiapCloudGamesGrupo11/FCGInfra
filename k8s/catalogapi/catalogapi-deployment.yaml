apiVersion: apps/v1
kind: Deployment
metadata:
  name: catalog-api

spec:
  replicas: 1

  selector:
    matchLabels:
      app: catalog-api
  
  template:
    metadata:
      labels:
        app: catalog-api
  
    spec:
      containers:
      - name: catalog-api
        image: catalogapi:latest
        imagePullPolicy: IfNotPresent

        envFrom:
          - configMapRef:
              name: configmapcommon
        
          - secretRef:
              name: secretfcg

        ports:
        - containerPort: 8080

        resources:
          requests:
            cpu: "50m"
            memory: "64Mi"
          limits:
            cpu: "250m"
            memory: "256Mi"

        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          periodSeconds: 10
          failureThreshold: 3
          initialDelaySeconds: 20

        readinessProbe:
          httpGet:
            path: /health
            port: 8080
          periodSeconds: 10
          failureThreshold: 5
          initialDelaySeconds: 3

        env:
        - name: ASPNETCORE_URLS
          value: http://+:8080
